<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Contact - Agri Solutions Ltd</title>

    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        }

        body {
            background: #0f172a;
            color: white;
        }

        header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 15px 40px;
            background: rgba(0,0,0,0.7);
        }

        header h2 {
            color: #22c55e;
        }

        nav a {
            color: white;
            margin-left: 20px;
            text-decoration: none;
            transition: 0.3s;
        }

        nav a:hover {
            color: #22c55e;
        }

        .contact {
            padding: 60px 20px;
            text-align: center;
        }

        .contact h1 {
            font-size: 2.5rem;
            margin-bottom: 20px;
        }

        .info {
            margin-bottom: 30px;
            line-height: 1.8;
        }

        .container {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(300px, 1fr));
            gap: 30px;
            margin-top: 30px;
        }

        form {
            background: #1f2933;
            padding: 20px;
            border-radius: 15px;
        }

        input, textarea {
            width: 100%;
            padding: 12px;
            margin: 10px 0;
            border: none;
            border-radius: 8px;
        }

        button {
            width: 100%;
            padding: 12px;
            background: #22c55e;
            border: none;
            color: white;
            font-size: 1rem;
            border-radius: 8px;
            cursor: pointer;
        }

        button:hover {
            background: #16a34a;
        }

        iframe {
            width: 100%;
            height: 100%;
            min-height: 350px;
            border: none;
            border-radius: 15px;
        }

        footer {
            text-align: center;
            padding: 20px;
            background: #020617;
            margin-top: 40px;
        }
    </style>
</head>
<body>

<header>
    <h2>Agri Solutions Ltd</h2>
    <nav>
        <a href="index.html">Home</a>
        <a href="about.html">About</a>
        <a href="product.html">Services</a>
        <a href="business.html">Business</a>
        <a href="contact.html">Contact</a>
    </nav>
</header>

<section class="contact">
    <h1>Get In Touch</h1>

    <div class="info">
        <p><strong>Address:</strong> Hleoheng Likotjaneng, Maputsoe, Leribe, Lesotho</p>
        <p><strong>Phone:</strong> +266 58352265 / +266 62665242</p>
        <p><strong>Email:</strong> masiloneo36@gmail.com</p>
    </div>

    <div class="container">

        <!-- FORM -->
        <form>
            <input type="text" placeholder="Your Name" required>
            <input type="email" placeholder="Your Email" required>
            <input type="tel" placeholder="Phone Number">
            <textarea placeholder="Your Message" rows="5" required></textarea>
            <button type="submit">Send Message</button>
        </form>

        <!-- MAP -->
        <iframe 
            src="https://www.google.com/maps?q=Maputsoe%20Hleoheng%20Lesotho&output=embed">
        </iframe>

    </div>
</section>

<footer>
    <p>© 2026 Agri Solutions Ltd | Built by Neo</p>
</footer>

</body>
</html>
